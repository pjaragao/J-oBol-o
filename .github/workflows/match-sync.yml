name: Match Sync Cron

on:
  schedule:
    - cron: '*/20 * * * *' # Runs every 20 minutes
  workflow_dispatch: # Allows manual triggering
    inputs:
      sync_type:
        description: 'Sync Type (live or full)'
        required: true
        default: 'live'
        type: choice
        options:
        - live
        - full

jobs:
  trigger-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Update Matches API
        run: |
          echo "Triggering ${{ inputs.sync_type || 'live' }} sync..."
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X GET "${{ secrets.APP_URL }}/api/cron/update-matches?type=${{ inputs.sync_type || 'live' }}" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          -H "Content-Type: application/json")
          
          http_code=$(echo "$response" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          body=$(echo "$response" | sed -e 's/HTTP_STATUS:.*//')
          
          echo "Response Body: $body"
          echo "HTTP Status: $http_code"
          
          if [ "$http_code" -ne 200 ]; then
            echo "Error: API returned status $http_code"
            exit 1
          fi
